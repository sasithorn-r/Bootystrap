<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { min-height: 100vh; }
      .demo-box { min-height: 72px; }
      .code-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
      
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small fw-semibold mb-1">Bootstrap 5.3 Topic Example</p>
          <h1 class="h3 fw-bold mb-1">แบบฟอร์มลงทะเบียนผู้ป่วย</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap justify-content-end"><a class="btn btn-sm btn-outline-secondary" href="index.html">Back</a><a class="btn btn-sm btn-outline-secondary" href="04-05-validation-states-feedback.html">Previous</a><a class="btn btn-sm btn-primary" href="05-01-landing-page-complete-workshop.html">Next</a></div>
      </div>

       <section class="row justify-content-center"><div class="col-xl-8"><form class="bg-white border rounded-3 p-4">
        <h2 class="h4 mb-3">ลงทะเบียน</h2>
        <div class="row g-3">
          <div class="col-md-6 form-floating"><input class="form-control" id="prefix" placeholder="คำนำหน้า"><label for="prefix">คำนำหน้า</label></div>
          <div class="col-md-6 form-floating"><input class="form-control" id="first" placeholder="ชื่อ"><label for="first">ชื่อ</label></div>
          <div class="col-md-6 form-floating"><input class="form-control" id="last" placeholder="นามสกุล"><label for="last">นามสกุล</label></div>
          <div class="col-md-6"><label class="form-label">เพศ</label><select class="form-select"><option>ชาย</option><option>หญิง</option></select></div>
          <div class="col-12">
  <label class="form-label">วัน/เดือน/ปีเกิด</label>
  <div class="row g-2">
    <div class="col-4">
      <select id="dob-day" name="dob_day" class="form-select" required>
        <option value="">วัน</option>
      </select>
    </div>
    <div class="col-4">
      <select id="dob-month" name="dob_month" class="form-select" required>
        <option value="">เดือน</option>
        <option value="1">มกราคม</option>
        <option value="2">กุมภาพันธ์</option>
        <option value="3">มีนาคม</option>
        <option value="4">เมษายน</option>
        <option value="5">พฤษภาคม</option>
        <option value="6">มิถุนายน</option>
        <option value="7">กรกฎาคม</option>
        <option value="8">สิงหาคม</option>
        <option value="9">กันยายน</option>
        <option value="10">ตุลาคม</option>
        <option value="11">พฤศจิกายน</option>
        <option value="12">ธันวาคม</option>
      </select>
    </div>
    <div class="col-4">
      <select id="dob-year" name="dob_year" class="form-select" required>
        <option value="">ปี</option>
      </select>
    </div>
  </div>
</div>
          <div class="col-md-6 form-floating"><input class="form-control" id="address" placeholder="ที่อยู่"><label for="address">ที่อยู่</label></div>
          <div class="col-md-6 form-floating"><input class="form-control" id="phone" placeholder="เบอร์โทรศัพท์"><label for="phone">เบอร์โทรศัพท์</label></div>
          <div class="col-12"><label class="form-label">Domain</label><div class="input-group"><span class="input-group-text">https://</span><input class="form-control"><span class="input-group-text">.com</span></div></div>
          <div class="col-12"><button class="btn btn-primary w-100">Create account</button></div>
        </div>
      </form></div></section>
    </main>
  </body>
</html>
