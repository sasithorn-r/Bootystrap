<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid">
      <h1 class="display-1 m-3 p-5 border text-success">Welcome to Bootstrap 5</h1>
      <p class="lead text-center">This is a simple example of a Bootstrap 5 page.</p>

      <div class="row">
        <div class="p-2 text-center col-md-3 col-lg-3 bg-primary text-white">
            COL-6
        </div>
        <div class="p-2 text-center col-md-3 col-lg-3 bg-secondary text-white">
            COL-6 
        </div>
        <div class="p-2 text-center col-md-3 col-lg-3 bg-danger text-white">
            COL-6
        </div>
        <div class="p-2 text-center col-md-3 col-lg-3 bg-warning text-dark">
            COL-6   
        </div>

        <div class="col-12 mt-4 justify-content-center d-flex">
            <button class="btn btn-lg btn-outline-primary me-2">Click Me</button>
            <button class="btn btn-lg btn-outline-warning">Reset</button>        
        </div>
          
           
        <div class="mt-3 alert alert-danger" role="alert">A simple danger alert—check it out!</div>
        <div class="row">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="border card h-100">
                    <div class="card-body">
                        <span class="badge text-bg-success mb-2">New</span>
                        <h2 class="h-5 m-2">Nested Row</h2>
                        <p class="m-2">This is a nested row inside the main row.</p>
                        <img src="https://i.pinimg.com/736x/52/47/0b/52470bd9db1d97a4141fdb6d05e1c7b8.jpg" class="img-fluid m-2" alt="Placeholder Image">
                        <button class="btn btn-outline-primary m-2">Choose plan</button>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="list-group">
                     <button class="list-group-item list-group-item-action active">Dashboard overview</button>
                     <button class="list-group-item list-group-item-action">Customer records</button>
                    <button class="list-group-item list-group-item-action">Reports and exports</button>
                </div>
            </div>
   
            
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h2 class="card-title h5">ยอดผู้ใช้งานประจำสัปดาห์</h2>
                        <canvas id="userChart" height="120"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('userChart');
        if (ctx) {
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัส', 'ศุกร์', 'เสาร์', 'อาทิตย์'],
                    datasets: [{
                        label: 'ผู้ใช้งานใหม่',
                        data: [12, 19, 14, 25, 22, 18, 27],
                        borderColor: 'rgba(54, 162, 235, 0.8)',
                        backgroundColor: 'rgba(54, 162, 235, 0.2)',
                        fill: true,
                        tension: 0.3,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 5
                            }
                        }
                    }
                }
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
